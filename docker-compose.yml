# InkMCP Server - Docker Compose Configuration
# Run with: docker-compose up -d

services:
  inkmcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inkmcp-server
    ports:
      - "8000:8000"
    environment:
      - MCP_TRANSPORT=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - MCP_LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/mcp"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

